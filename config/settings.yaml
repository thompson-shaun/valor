bank:
  # Percentage of daily gross earned valor deposited into the Vault.
  # Applied as: daily_vault_deposit = ceil(daily_gross_earned * deposit_percent / 100)
  deposit_percent: 50
  # Default player name used when --player is not specified.
  # Player data lives in data/<player>/
  default_player: default
  # Player options for workflows and tooling
  players:
    - default

weekly_thresholds:
  gold: 80
  green: 60
  yellow: 40
  # Below yellow threshold = red

tier_names:
  default:
    gold: Legend
    green: Champion
    yellow: Knight
    red: Recruit
  players: {}

midweek_checkpoint:
  enabled: true
  day: Wednesday
  threshold: 40
  bonus_points: 3

protected_activities:
  - Swimming (Mon)
  - Rock climbing (Wed, Sat)
