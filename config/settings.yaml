bank:
  # Percentage of daily gross earned points deposited into the reward bank.
  # Applied as: daily_bank_deposit = ceil(daily_gross_earned * deposit_percent / 100)
  deposit_percent: 50
  # Default player name used when --player is not specified.
  # Player data lives in data/<player>/
  default_player: default

weekly_thresholds:
  gold: 80
  green: 60
  yellow: 40
  # Below yellow threshold = red

midweek_checkpoint:
  enabled: true
  day: Wednesday
  threshold: 40
  bonus_points: 3

protected_activities:
  - Swimming (Mon)
  - Rock climbing (Wed, Sat)
