name: Bank Transaction

on:
  issues:
    types: [labeled]

jobs:
  process-transaction:
    if: >-
      contains(github.event.issue.labels.*.name, 'bank-transaction') &&
      github.event.issue.user.login == 'thompson-shaun'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process with Claude
        uses: anthropics/claude-code-action@beta
        with:
          prompt: |
            Process the bank transaction described in the issue below.
            Use scripts/bank.sh to execute the transaction. Parse the issue body
            for: transaction type, amount, player (optional), and description.

            Run the script like:
              scripts/bank.sh [--player <name>] <type> <amount> "<description>"

            If no player is specified in the issue, omit the --player flag
            (the script will use the default from config/settings.yaml).

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}
          allowed_tools: "Bash,Read,Glob,Grep"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            gh issue close "$ISSUE_NUMBER" --comment "No changes were needed."
            exit 0
          fi

          branch="bank-transaction/${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/
          git commit -m "Bank transaction from #${ISSUE_NUMBER}"
          git push -u origin "$branch"

          gh pr create \
            --title "Bank transaction from #${ISSUE_NUMBER}" \
            --body "Automated bank transaction from issue #${ISSUE_NUMBER}.

          Fixes #${ISSUE_NUMBER}" \
            --head "$branch" \
            --base main

          gh pr merge "$branch" --auto --squash
