name: Claude

on:
  issue_comment:
    types: [created]
  issues:
    types: [assigned, labeled]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: >-
      github.actor == 'thompson-shaun' &&
      (github.event_name == 'issues' || contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          assignee_trigger: "claude"
          label_trigger: "claude"
          custom_instructions: |
            After committing and pushing your changes, always create a pull
            request using gh pr create. Include "Fixes #<issue-number>" in
            the PR body so the issue closes on merge.
