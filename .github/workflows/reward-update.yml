name: Reward Table Update

on:
  issues:
    types: [labeled]

jobs:
  update-rewards:
    if: >-
      contains(github.event.issue.labels.*.name, 'reward-update') &&
      github.event.issue.user.login == 'thompson-shaun'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue and update rewards
        uses: anthropics/claude-code-action@beta
        with:
          prompt: |
            Read the issue body below and update config/rewards.yaml accordingly.
            Then update docs/src/content/docs/rewards/shop.md to reflect the change.
            Follow the existing YAML structure and markdown format exactly.

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}
          allowed_tools: "Edit,Read,Glob,Grep"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            gh issue close "$ISSUE_NUMBER" --comment "No changes were needed."
            exit 0
          fi

          branch="reward-update/${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add config/ docs/
          git commit -m "Update reward table from #${ISSUE_NUMBER}"
          git push -u origin "$branch"

          gh pr create \
            --title "Update reward table from #${ISSUE_NUMBER}" \
            --body "Automated reward table update from issue #${ISSUE_NUMBER}.

          Please review the changes to \`config/rewards.yaml\` and \`docs/src/content/docs/rewards/shop.md\`.

          Fixes #${ISSUE_NUMBER}" \
            --head "$branch" \
            --base main \
            --label "reward-update"
