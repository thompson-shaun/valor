name: Reward Table Update

on:
  issues:
    types: [labeled]

jobs:
  update-rewards:
    if: >-
      contains(github.event.issue.labels.*.name, 'reward-update') &&
      github.event.issue.user.login == 'thompson-shaun'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue and update rewards
        uses: anthropics/claude-code-action@beta
        with:
          direct_prompt: |
            Read the issue body below and update config/rewards.yaml accordingly.
            Then update docs/src/content/docs/rewards/shop.md to reflect the change.
            Follow the existing YAML structure and markdown format exactly.

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}
          allowed_tools: "Edit,Read,Glob,Grep"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

