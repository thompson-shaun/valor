name: Transactions (Manual)

on:
  workflow_dispatch:
    inputs:
      type:
        description: Transaction type
        required: true
        type: choice
        options:
          - deposit
          - redeem
          - set
      amount:
        description: Amount (positive integer; set can be 0)
        required: true
        type: string
      description:
        description: Description
        required: true
        type: string
      player:
        description: Player
        required: true
        type: choice
        options:
          # BEGIN GENERATED PLAYERS
          - "default"
          # END GENERATED PLAYERS
      auto_merge:
        description: Auto-merge PR after verify
        required: true
        type: boolean
        default: false

jobs:
  transact:
    if: github.actor == 'thompson-shaun'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run transaction
        run: |
          set -euo pipefail
          scripts/vault.sh --no-commit --player "${{ inputs.player }}" "${{ inputs.type }}" "${{ inputs.amount }}" "${{ inputs.description }}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          branch="transactions/manual-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/
          git commit -m "Transaction (manual)"
          git push -u origin "$branch"

          sha=$(git rev-parse HEAD)
          if scripts/vault.sh verify && bash tests/vault_test.sh; then
            verify_state="success"
          else
            verify_state="failure"
          fi
          gh api repos/${{ github.repository }}/statuses/$sha \
            -f state="$verify_state" \
            -f context="verify" \
            -f description="Ledger verification"

          pr_url=$(gh pr create \
            --title "Transaction (manual)" \
            --body "Manual transaction triggered by workflow run ${{ github.run_id }}." \
            --head "$branch" \
            --base main) || { echo "Failed to create PR"; exit 1; }

          if [[ "${{ inputs.auto_merge }}" == "true" ]]; then
            gh pr merge "$branch" --auto --squash --delete-branch
          fi

          echo "Created PR: $pr_url"
