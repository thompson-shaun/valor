name: Verify Ledger

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify ledger integrity for all players
        run: |
          failed=0
          for player_dir in data/*/; do
            player=$(basename "$player_dir")
            echo "--- Verifying player: $player ---"
            if ! scripts/bank.sh --player "$player" verify; then
              failed=1
            fi
          done
          if [[ "$failed" -ne 0 ]]; then
            echo "Ledger verification failed!"
            exit 1
          fi

      - name: Ensure workflow inputs are up to date
        run: |
          node scripts/generate-workflow-inputs.js
          if ! git diff --quiet .github/workflows/*-manual.yml; then
            echo "Workflow inputs are out of date. Run: node scripts/generate-workflow-inputs.js"
            git --no-pager diff .github/workflows/*-manual.yml
            exit 1
          fi

      - name: Verify workflow inputs match config
        run: node scripts/verify-workflow-inputs.js

      - name: Run bank tests
        run: bash tests/bank_test.sh

      - name: Build docs
        working-directory: ./docs
        run: npm ci && npm run build

      - name: Link check (internal)
        working-directory: ./docs
        run: npm run linkcheck
