name: Weekly Check-In

on:
  issues:
    types: [labeled]

jobs:
  process-checkin:
    if: >-
      contains(github.event.issue.labels.*.name, 'weekly-checkin') &&
      github.event.issue.user.login == 'thompson-shaun'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process check-in
        uses: anthropics/claude-code-action@beta
        with:
          direct_prompt: |
            Process the weekly check-in from the issue below.
            Follow the instructions in .claude/skills/checkin.md:
            1. Parse the weekly total (and player if provided) from the issue body
            2. Determine the week (default to last Monday)
            3. Compute tier from config/settings.yaml thresholds
            4. Compute bank deposit using scripts/bank.sh calc-deposit
            5. Run scripts/bank.sh deposit for the bank deposit
            6. Write the weekly summary JSON to data/<player>/weeks/<date>.json

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}
          allowed_tools: "Bash,Read,Write,Glob,Grep"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            gh issue close "$ISSUE_NUMBER" --comment "No changes were needed."
            exit 0
          fi

          branch="weekly-checkin/${ISSUE_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/
          git commit -m "Weekly check-in from #${ISSUE_NUMBER}"
          git push -u origin "$branch"

          gh pr create \
            --title "Weekly check-in from #${ISSUE_NUMBER}" \
            --body "Automated weekly check-in from issue #${ISSUE_NUMBER}.

          Fixes #${ISSUE_NUMBER}" \
            --head "$branch" \
            --base main

          gh pr merge "$branch" --auto --squash
