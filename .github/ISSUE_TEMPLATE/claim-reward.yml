name: Claim Reward
description: Redeem VP from the Vault to claim a reward
title: "[Claim] "
labels: ["claim-reward"]
body:
  - type: dropdown
    id: reward
    attributes:
      label: Reward
      options:
        - "Extra 30 min screen time (10 VP)"
        - "Small treat - candy, snack (10 VP)"
        - "Stay up 20 min past bedtime (15 VP)"
        - "Boba or special drink (20 VP)"
        - "Pick the family movie (20 VP)"
        - "Extra 1 hour screen time (25 VP)"
        - "Pick dinner for the family (30 VP)"
        - "Stay up 30 min past bedtime (15 VP)"
        - "Disney trip - 3-4 hours (40 VP)"
        - "Small toy or book (50 VP)"
        - "Special outing - just him + parent (60 VP)"
        - "Big reward (100 VP)"
        - "Nintendo Switch 2 (250 VP)"
    validations:
      required: true

  - type: input
    id: player
    attributes:
      label: Player
      description: Leave blank to use the default player from settings.yaml
      placeholder: e.g., default
    validations:
      required: false

  - type: input
    id: notes
    attributes:
      label: Notes
      description: Optional details about this claim
      placeholder: e.g., Picked pepperoni pizza for dinner
    validations:
      required: false
