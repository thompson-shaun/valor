name: Enhancement
description: Suggest an improvement or new feature
title: "[Enhancement] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      placeholder: Describe the improvement or feature
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Why?
      placeholder: What problem does this solve or what does it make easier?
    validations:
      required: false
